<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>

    <!-- Immediately apply saved theme (prevents flash) -->
    <script>
      (function () {
        try {
          const persisted = localStorage.getItem('theme');
          if (persisted === 'dark') document.documentElement.classList.add('dark');
          else if (persisted === 'light') document.documentElement.classList.add('light');
          else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <script>
      window.tailwind = {
        config: {
          darkMode: 'class',
          theme: {
            extend: {}
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="antialiased bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
